# MatterCameras — server deploy (host network for mDNS/Matter)
#
# Host ports (check for conflicts with other apps):
#   3202  — Web UI
#   3203  — go2rtc API
#   5550  — Matter (TCP/UDP)
#   8554  — go2rtc RTSP relay
#   8555  — WebRTC (TCP/UDP)
#   5353  — mDNS (UDP)

services:
  go2rtc:
    build:
      context: ./docker/go2rtc
    image: matter-go2rtc:patched
    container_name: matter_go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      # Read-only: app re-registers streams via API on boot; prevents go2rtc from stripping webrtc config.
      - ./data/go2rtc.yaml:/config/go2rtc.yaml:ro
    environment:
      # Force pion (the WebRTC library) to emit ICE+DTLS state to go2rtc's logger
      # so we can see why media pairs do not nominate / DTLS does not start.
      - PION_LOG_DEBUG=all
      - PION_LOG_TRACE=ice,dtls
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3203/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build: .
    container_name: matter_cameras
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      # quick-deploy.sh syncs package.json so /api/version and UI badge match the deployed build.
      - ./package.json:/app/package.json:ro
      # quick-deploy.sh syncs dist/ on the host; bind-mount so restarts pick up JS without image rebuild.
      - ./dist:/app/dist:ro
      - ./views:/app/views:ro
      - ./public:/app/public:ro
    environment:
      - NODE_ENV=production
      - MATTER_STORAGE_PATH=/app/data/matter-storage
      - MATTER_HOST=${MATTER_HOST:-127.0.0.1}
      - MATTER_BIND_HOST=0.0.0.0
      - MATTER_PORT=${MATTER_PORT:-5550}
      - WEB_PORT=${WEB_PORT:-3202}
      - GO2RTC_URL=${GO2RTC_URL:-http://127.0.0.1:3203}
    depends_on:
      go2rtc:
        condition: service_healthy
