# Matter Cameras Bridge — server deploy (host network for mDNS/Matter)
#
# Host ports (check for conflicts with other apps):
#   3202  — Web UI
#   3203  — go2rtc API
#   5550  — Matter (TCP/UDP)
#   8554  — go2rtc RTSP relay
#   8555  — WebRTC (TCP/UDP)
#   5353  — mDNS (UDP)

services:
  go2rtc:
    build:
      context: ./docker/go2rtc
    image: matter-go2rtc:patched
    container_name: matter_go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      # Read-only: app re-registers streams via API on boot; prevents go2rtc from stripping webrtc config.
      - ./data/go2rtc.yaml:/config/go2rtc.yaml:ro
    environment:
      # Force pion (the WebRTC library) to emit ICE+DTLS state to go2rtc's logger
      # so we can see why media pairs do not nominate / DTLS does not start.
      - PION_LOG_DEBUG=all
      - PION_LOG_TRACE=ice,dtls
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3203/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build: .
    container_name: matter_cameras
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      # Host package.json + dist/ bind-mount so restarts pick up built JS without image rebuild.
      - ./package.json:/app/package.json:ro
      # npm run build on the host updates dist/; container reads it on restart.
      - ./dist:/app/dist:ro
      - ./views:/app/views:ro
      - ./public:/app/public:ro
      # Full project checkout for one-click updates from the Web UI (git + docker compose on host).
      - .:/project:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      # matter.js log timestamps use the process timezone (Date.getHours(), not UTC).
      - TZ=${TZ:-America/Sao_Paulo}
      - MATTER_STORAGE_PATH=/app/data/matter-storage
      - MATTER_HOST=${MATTER_HOST:-127.0.0.1}
      - MATTER_BIND_HOST=${MATTER_BIND_HOST:-${MATTER_HOST:-127.0.0.1}}
      - MATTER_PORT=${MATTER_PORT:-5550}
      - WEB_PORT=${WEB_PORT:-3202}
      - GO2RTC_URL=${GO2RTC_URL:-http://127.0.0.1:3203}
      # Repo polled for update notifications (override to a fork via .env).
      - GITHUB_REPO=${GITHUB_REPO:-patricktd/MatterCameras}
      - MATTER_CAMERAS_SELF_UPDATE_ROOT=/project
    depends_on:
      go2rtc:
        condition: service_healthy
